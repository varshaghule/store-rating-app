version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: store_rating_db
    environment:
      POSTGRES_DB: store_rating_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: store_rating_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: store_rating_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: change_this_in_production_super_secret
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: store_rating_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  pgdata:
